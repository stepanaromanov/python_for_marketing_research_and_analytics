# ============================================================
# Marketing Analytics Portfolio — Conda Environment
# Python 3.12
#
# Create : conda env create -f environment.yml
# Activate: conda activate marketing-portfolio
# Update  : conda env update -f environment.yml --prune
# Export  : conda env export > environment_lock.yml
# Remove  : conda env remove -n marketing-portfolio
# ============================================================

name: marketing-portfolio

channels:
  - conda-forge       # preferred — better package resolution
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────
  - python=3.12

  # ── Core data stack ───────────────────────────────────────
  - numpy>=1.26,<2.0
  - pandas>=2.2,<3.0
  - scipy>=1.13

  # ── Visualisation ─────────────────────────────────────────
  - plotly>=5.22
  - matplotlib>=3.9
  - seaborn>=0.13

  # ── Graph (Projects 01, 05, 12) ───────────────────────────
  - networkx>=3.3

  # ── Causal ML (Projects 11, 13) ───────────────────────────
  - scikit-learn>=1.5

  # ── Statistics (Project 17) ───────────────────────────────
  - statsmodels>=0.14

  # ── Optimisation (Projects 04, 08, 14) ────────────────────
  - pulp>=2.9

  # ── Notebook environment ──────────────────────────────────
  - jupyterlab>=4.2
  - ipywidgets>=8.1
  - nbformat>=5.10
  - nbconvert>=7.16
  - nodejs>=20          # required for JupyterLab extensions

  # ── Utilities ─────────────────────────────────────────────
  - python-dotenv>=1.0
  - pyyaml>=6.0
  - tqdm>=4.66
  - joblib>=1.4
  - git                 # ensure git available in environment

  # ── pip-only packages (no conda build available) ──────────
  - pip
  - pip:
    # Shapley & explainability
    - shap>=0.46

    # MLflow
    - mlflow>=2.14

    # DVC
    - dvc>=3.51

    # Drift monitoring
    - evidently>=0.4.33

    # API serving
    - fastapi>=0.111
    - uvicorn[standard]>=0.30
    - pydantic>=2.7

    # Causal ML
    - econml>=0.15

    # Pingouin (stats)
    - pingouin>=0.5.4

    # Plotly static export
    - kaleido>=0.2.1

    # ── Heavy optional installs ───────────────────────────
    # Uncomment one at a time — these are large and may need
    # extra system dependencies (C compiler, Fortran, etc.)

    # PyMC — Bayesian MMM (Projects 03, 06, 07, 08, 10)
    # Requires: conda install -c conda-forge pymc
    # - pymc>=5.16

    # Meridian — Google's MMM library (Projects 03, 06, 07, 08, 09)
    # Requires TensorFlow — install separately:
    # pip install meridian
    # - meridian-mmm>=0.1

    # Apache Airflow — orchestration (Projects 05, 08, 14, 20)
    # Strongly recommended via Docker instead:
    # https://airflow.apache.org/docs/docker-stack/
    # - apache-airflow>=2.9

    # Kafka — streaming MLOps (Project 12)
    # - kafka-python>=2.0

    # ONNX — model export for Triton serving (Project 10)
    # - onnx>=1.16
    # - onnxmltools>=1.12
